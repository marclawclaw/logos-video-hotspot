      .block { fill: #323230; }
      .block-dense { fill: #3a3a38; }
      .road-hwy  { stroke: #6a6a30; stroke-width: 14; fill: none; stroke-linecap: round; }
      .road-art  { stroke: #555550; stroke-width: 9;  fill: none; stroke-linecap: round; }
      .road-sec  { stroke: #454540; stroke-width: 5;  fill: none; stroke-linecap: round; }
      .road-str  { stroke: #383830; stroke-width: 2;  fill: none; }
      .road-hwy-cl { stroke: #8a7a20; stroke-width: 1.5; fill: none; stroke-dasharray: 12,10; }
      .road-art-cl { stroke: #505040; stroke-width: 0.8; fill: none; stroke-dasharray: 8,8; }
      .label-district { fill: #607060; font-family: sans-serif; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .label-road { fill: #555548; font-family: sans-serif; font-size: 9px; }
      .label-water { fill: #2a5a7a; font-family: sans-serif; font-size: 13px; font-style: italic; }
      .bridge { stroke: #6a6040; stroke-width: 10; fill: none; }
      .bridge-rail { stroke: #555540; stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
    </style>
    <!-- Drop shadow for pins -->
